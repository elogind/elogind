# Entries in this file show the compile time defaults specific to elogind.
# Local configuration should be created here with a higher leading number so
# they are parsed later overriding the defaults.
#
# See logind.conf(5) for details.

[Login]
# elogind is not a system manager, so it does not remove IPC-items by default
#RemoveIPC=no

# Create a user-owned per-session cgroup subtree on unified cgroup v2.
# Session processes are moved into a session/ leaf subgroup. The empty
# session cgroup subtree also contains delegated/, which may be used by
# the session user for user-managed cgroup subgroups. Enabling this is an
# opt-in delegation feature; the administrator enabling it is responsible
# for its use.
#DelegateSessionCgroups=no
